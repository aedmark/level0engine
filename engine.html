<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 0 Engine</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="./three.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error("SW Registration Failed:", err));
            });
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #screen-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            border: 1px solid rgba(212, 195, 130, 0.2);
            box-sizing: border-box;
            background-color: #000;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #canvas-container canvas {
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }

        .control-panel {
            pointer-events: auto;
            background: rgba(20, 20, 15, 0.85);
            border: 1px solid #d4c382;
            padding: 1.5rem;
            width: 320px;
            max-width: calc(100vw - 4rem);
            max-height: 60vh;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(212, 195, 130, 0.2);
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: bold;
            color: #d4c382;
            margin: 0 0 1rem 0;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #d4c382;
            padding-bottom: 0.5rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #a89f68;
            margin-bottom: 0.25rem;
        }

        .btn-container {
            margin-top: 1rem;
        }

        .btn {
            background: #2a2a20;
            color: #d4c382;
            border: 1px solid #d4c382;
            padding: 0.5rem 1rem;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            margin-top: 0.5rem;
            box-sizing: border-box;
        }

        .btn:hover {
            background: #d4c382;
            color: #111;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #captureBtn {
            background: #4a452a;
        }

        #captureBtn:hover {
            background: #d4c382;
        }

        .instructions {
            margin-top: 1rem;
            font-size: 10px;
            color: #7a7558;
            line-height: 1.25;
        }

        .instructions p {
            margin: 0;
        }

        .instructions p + p {
            margin-top: 0.25rem;
        }

        @keyframes phosphor-flicker {
            0%, 100% {
                opacity: 0.9;
            }
            4% {
                opacity: 0.5;
                text-shadow: 4px 2px 0px rgba(0, 0, 0, 1), 0 0 4px rgba(255, 255, 255, 0.4);
            }
            8% {
                opacity: 0.95;
                text-shadow: 1px 2px 0px rgba(0, 0, 0, 1), 0 0 12px rgba(255, 255, 255, 1), 0 0 20px rgba(255, 255, 255, 0.8);
            }
            12% {
                opacity: 0.8;
            }
            16% {
                opacity: 0.9;
            }
        }

        .osd-element {
            position: absolute;
            color: #ffffff;
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            letter-spacing: 0.05em;
            opacity: 0.9;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 1), 0 0 8px rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 255, 255, 0.4);
            z-index: 10;
            pointer-events: none;
            animation: phosphor-flicker 120s infinite;
        }

        #vhs-time {
            top: 2rem;
            right: 3rem;
            text-align: right;
            line-height: 1.0;
        }

        .status-bar {
            bottom: 2rem;
            left: 0;
            width: 100%;
            padding: 0 3rem;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
        }

        #coords {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        #battery-wrapper {
            top: 2rem;
            left: 3rem;
            display: flex;
            align-items: center;
            filter: drop-shadow(2px 2px 0px rgba(0, 0, 0, 1)) drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }

        #battery-body {
            width: 50px;
            height: 22px;
            border: 2px solid #fff;
            padding: 2px;
            box-sizing: border-box;
        }

        #battery-level {
            width: 100%;
            height: 100%;
            background-color: #fff;
            transition: width 0.2s linear, background-color 0.2s;
        }

        #battery-tip {
            width: 4px;
            height: 10px;
            background-color: #fff;
        }

        @media (max-width: 900px), (max-height: 500px) {
            .osd-element {
                font-size: 1.2rem;
            }

            #vhs-time {
                top: 1rem;
                right: 1.2rem;
            }

            .status-bar {
                padding: 0 1.2rem;
                bottom: 1rem;
            }

            #coords {
                font-size: 0.8rem;
            }

            #battery-wrapper {
                top: 1rem;
                left: 1.2rem;
            }

            #battery-body {
                width: 30px;
                height: 14px;
                border-width: 1px;
                padding: 1px;
            }

            #battery-tip {
                width: 2px;
                height: 6px;
            }
        }

        .vhs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.85) 150%);
            mix-blend-mode: multiply;
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
            opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        #flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-out;
        }

        input[type=text] {
            width: 100%;
            background: #111;
            color: #d4c382;
            border: 1px solid #d4c382;
            padding: 0.5rem;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 1rem;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        input[type=text]:focus {
            background: #222;
        }

        select {
            width: 100%;
            background: #111;
            color: #d4c382;
            border: 1px solid #d4c382;
            padding: 0.5rem;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 1rem;
            cursor: pointer;
            box-sizing: border-box;
        }

        select:focus {
            background: #222;
        }

        input[type=range] {
            width: 100%;
            accent-color: #d4c382;
            background: #333;
            height: 4px;
            outline: none;
            margin-bottom: 1rem;
            -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #d4c382;
            cursor: pointer;
        }

        #mobile-ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            display: flex;
            pointer-events: none;
        }

        .touch-zone {
            flex: 1;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
        }

        #menuToggleBtn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: auto;
            pointer-events: auto;
            z-index: 20;
            touch-action: manipulation;
        }

        #orientation-warning {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: #d4c382;
            z-index: 99999;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 2rem;
            box-sizing: border-box;
        }

        #orientation-warning h2 {
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        #orientation-warning p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #a89f68;
        }

        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }

        .mobile-action-btn {
            display: none;
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(20, 20, 15, 0.7);
            border: 2px solid #d4c382;
            color: #d4c382;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 30;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .mobile-action-btn.active {
            background: #d4c382;
            color: #000;
        }

        #mobile-run {
            left: 2rem;
            bottom: 8rem;
        }

        #mobile-crouch {
            right: 2rem;
            bottom: 8rem;
        }

        #mobile-flashlight {
            right: 2rem;
            bottom: 13rem;
        }

        @media (pointer: coarse) {
            .mobile-action-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
<div id="orientation-warning">
    <h2>SYSTEM ERROR</h2>
    <p>PORTRAIT ORIENTATION NOT SUPPORTED.<br>PLEASE ROTATE YOUR DEVICE.</p>
</div>
<div id="mobile-ui">
    <div id="touch-left" class="touch-zone"></div>
    <div id="touch-right" class="touch-zone"></div>
    <button id="mobile-run" class="mobile-action-btn">RUN</button>
    <button id="mobile-crouch" class="mobile-action-btn">CROUCH</button>
    <button id="mobile-flashlight" class="mobile-action-btn">LIGHT</button>
</div>
<div id="screen-wrapper">
    <div id="canvas-container"></div>
    <div class="vhs-overlay"></div>
    <div class="noise"></div>
    <div id="flash-overlay"></div>
    <div id="crosshair"></div>
    <span id="vhs-time" class="osd-element">AM 12:00:00 &nbsp;&nbsp; JAN 01 1997</span>
    <div id="battery-wrapper" class="osd-element">
        <div id="battery-body">
            <div id="battery-level"></div>
        </div>
        <div id="battery-tip"></div>
    </div>
    <div class="status-bar osd-element">
        <span id="coords">X: 0.00 | Z: 0.00</span>
    </div>
</div>
<div id="ui-layer">
    <button id="menuToggleBtn" class="btn">MENU</button>
    <div class="control-panel">
        <h1>LEVEL 0 ENGINE v0.3.4</h1>
        <div class="instructions">
            <p align="center">WASD to Move | Shift to Run<br>'E' to Interact | 'C' to Crouch<br>'Q' to Squeeze | 'F' for
                Flashlight<br>LMB to Look | RMB to Lean</p><br>
        </div><br>
        <label>Architecture Seed (String)</label>
        <input type="text" id="seedInput" value="LVL032">
        <label>Display Format</label>
        <select id="aspectSelect">
            <option value="auto">Dynamic (Full Window)</option>
            <option value="1.3333333333" selected>4:3 (VHS Camcorder)</option>
            <option value="1.7777777778">16:9 (Standard Widescreen)</option>
            <option value="2.3333333333">21:9 (Cinemascope)</option>
        </select>
        <label>Fog Density</label>
        <input type="range" id="fogSlider" min="2" max="8" value="5">
        <label>Camera FOV</label>
        <input type="range" id="fovSlider" min="60" max="90" value="75">
        <label>Player Speed (%)</label>
        <input type="range" id="speedSlider" min="80" max="120" value="100">
        <label>Internal Resolution</label>
        <select id="resolutionSelect">
            <option value="1.0">100% (Native)</option>
            <option value="0.5">50% (Retro / Performance)</option>
            <option value="0.25">25% (PS1 / Extreme Performance)</option>
        </select>
        <label>Master Volume (%)</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="100">
        <label>Gamma (Exposure)</label>
        <input type="range" id="gammaSlider" min="10" max="300" value="120">
        <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; cursor: pointer;">
            <input type="checkbox" id="headBobToggle" checked style="width: auto; margin: 0;">
            Enable Somatic Head Bob
        </label>
        <div class="btn-container">
            <button id="generateBtn" class="btn">Rebuild Geometry</button>
            <button id="captureBtn" class="btn">Capture Asset</button>
            <button id="clearSaveBtn" class="btn" style="border-color: #8a3333; color: #ff5555; margin-top: 1rem;">PURGE
                MEMORY
            </button>
        </div>
        <p align="center"><a href="https://github.com/aedmark/level0engine">RETURN TO SOURCE</a></p>
    </div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>

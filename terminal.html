<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEVEL 0 ENGINE // Execution</title>
    <meta name="theme-color" content="#050505">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        liminal: {
                            900: '#1a1811',
                            800: '#332d1c',
                            500: '#a89f68',
                            400: '#d4c382',
                            100: '#ffffe0'
                        },
                        crt: '#151515'
                    },
                    fontFamily: {
                        mono: ['"Space Mono"', 'monospace'],
                        vhs: ['VT323', 'monospace']
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #d4c382;
            overflow: hidden; /* Prevent body scroll to lock the terminal in place */
            user-select: none;
            -webkit-user-select: none;
        }

        /* NOISE OVERLAY */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* SCANLINES */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 49;
        }

        /* TERMINAL GLOW */
        @keyframes flicker {
            0% { opacity: 0.9; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            5% { opacity: 0.5; text-shadow: none; }
            10% { opacity: 0.9; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            15% { opacity: 1; text-shadow: 0 0 8px rgba(212, 195, 130, 0.6); }
            50% { opacity: 0.8; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(212, 195, 130, 0.8); }
        }

        .terminal-glow {
            animation: flicker 5s infinite alternate;
        }

        .btn-glitch {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-glitch:hover {
            background-color: #d4c382;
            color: #050505;
            box-shadow: 0 0 15px rgba(212, 195, 130, 0.5);
        }

        .btn-glitch::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-glitch:hover::before {
            left: 100%;
        }

        ::selection {
            background: #d4c382;
            color: #050505;
        }

        /* Specialized iframe styling */
        .iframe-container {
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        iframe {
            /* Ensures iframe content is not selectable */
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body class="font-mono text-sm antialiased h-screen w-screen flex flex-col relative">

<div class="noise-overlay"></div>
<div class="scanlines"></div>

<main class="flex-grow flex items-center justify-center p-2 sm:p-4 md:p-6 lg:p-8 relative z-10 w-full h-full">

    <div class="w-full h-full max-w-[1600px] bg-black/70 border border-liminal-800 p-4 md:p-6 shadow-2xl flex flex-col relative">

        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-liminal-800 to-transparent opacity-50"></div>

        <header class="flex justify-between items-end mb-4 border-b border-liminal-800 pb-3 flex-shrink-0">
            <div>
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold font-vhs terminal-glow tracking-widest text-liminal-100 uppercase">LVL0.SYS.EXEC</h1>
                <p class="text-liminal-500 mt-1 tracking-[0.2em] text-[10px] md:text-xs uppercase">PROCESS: engine.exe // VOLATILE MEMORY // ISOLATED MANIFOLD</p>
            </div>
            <div class="text-right text-[10px] md:text-xs text-liminal-800 font-bold tracking-widest flex flex-col gap-2">
                <span class="text-red-900/80 blink animate-pulse">ACTIVE INSTANCE</span>
                <a href="index.html" class="text-liminal-500 hover:text-red-500 hover:terminal-glow transition-colors uppercase tracking-[0.2em]">[ ABORT MANIFOLD ]</a>
            </div>
        </header>

        <!-- Container housing the WebGL Engine -->
        <div class="flex-grow relative border border-liminal-800 bg-[#020202] overflow-hidden iframe-container">
            <iframe
                    id="engine-frame"
                    src="engine.html"
                    class="w-full h-full border-0 outline-none block"
                    title="Level 0 Engine Workspace"
                    allow="fullscreen; autoplay; pointer-lock"
            ></iframe>
        </div>

        <footer class="mt-4 pt-3 border-t border-liminal-800 flex justify-between items-center flex-shrink-0">
            <div class="text-[10px] md:text-xs text-liminal-800 font-mono tracking-widest flex items-center gap-2">
                <span class="text-liminal-500 animate-pulse">>></span> SOMATIC LINK ESTABLISHED
            </div>

            <div class="flex gap-4">
                <button onclick="document.getElementById('engine-frame').contentWindow.location.reload();" class="text-liminal-500 hover:text-liminal-100 text-[10px] md:text-xs uppercase tracking-widest transition-colors">
                    [ SOFT REBOOT ]
                </button>
                <button onclick="requestEngineFullscreen()" class="btn-glitch inline-block border border-liminal-400 text-liminal-400 px-4 md:px-8 py-2 text-center uppercase tracking-[0.2em] font-bold text-[10px] md:text-xs">
                    Engage Fullscreen
                </button>
            </div>
        </footer>

    </div>
</main>

<script>
    function requestEngineFullscreen() {
        const iframe = document.getElementById('engine-frame');
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { /* Safari */
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { /* IE11 */
            iframe.msRequestFullscreen();
        }
    }
</script>

</body>
</html>

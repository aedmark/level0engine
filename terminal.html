<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>// LEVEL 0 ENGINE //</title>
    <meta name="theme-color" content="#050505">

    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --liminal-900: #1a1811;
            --liminal-800: #332d1c;
            --liminal-500: #a89f68;
            --liminal-400: #d4c382;
            --liminal-100: #ffffe0;
            --font-mono: 'Space Mono', monospace;
            --font-vhs: 'VT323', monospace;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        h1, p {
            margin: 0;
        }

        body {
            margin: 0;
            background-color: #050505;
            color: var(--liminal-400);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: relative;

            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes flicker {
            0% { opacity: 0.9; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            5% { opacity: 0.5; text-shadow: none; }
            10% { opacity: 0.9; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            15% { opacity: 1; text-shadow: 0 0 8px rgba(212, 195, 130, 0.6); }
            50% { opacity: 0.8; text-shadow: 0 0 4px rgba(212, 195, 130, 0.4); }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(212, 195, 130, 0.8); }
        }

        .terminal-glow {
            animation: flicker 5s infinite alternate;
        }

        @keyframes pulse-anim {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .animate-pulse {
            animation: pulse-anim 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        ::selection {
            background: var(--liminal-400);
            color: #050505;
        }

        .main-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .terminal-box {
            width: 100%;
            flex-grow: 1;
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--liminal-800);
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .terminal-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0.25rem;
            background: linear-gradient(to right, transparent, var(--liminal-800), transparent);
            opacity: 0.5;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--liminal-800);
            padding-bottom: 0.75rem;
            flex-shrink: 0;
        }

        .terminal-title {
            font-size: 1.875rem;
            font-weight: 700;
            font-family: var(--font-vhs);
            letter-spacing: 0.1em;
            color: var(--liminal-100);
            text-transform: uppercase;
        }

        .terminal-subtitle {
            color: var(--liminal-500);
            margin-top: 0.25rem;
            letter-spacing: 0.2em;
            font-size: 10px;
            text-transform: uppercase;
        }

        .sys-info {
            text-align: right;
            font-size: 10px;
            color: var(--liminal-800);
            font-weight: 700;
            letter-spacing: 0.1em;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .active-instance {
            color: rgba(127, 29, 29, 0.8);
        }

        .abort-link {
            color: var(--liminal-500);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.2s ease;
        }

        .abort-link:hover {
            color: #ef4444;
            animation: flicker 5s infinite alternate;
        }

        .iframe-wrapper {
            flex-grow: 1;
            relative: relative;
            border: 1px solid var(--liminal-800);
            background-color: #020202;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            position: relative;
        }

        iframe {
            -webkit-touch-callout: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            outline: none;
            display: block;
        }

        .terminal-footer {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--liminal-800);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .somatic-status {
            font-size: 10px;
            color: var(--liminal-800);
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .somatic-arrows {
            color: var(--liminal-500);
        }

        .footer-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-reboot {
            background: transparent;
            border: none;
            color: var(--liminal-500);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s ease;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }

        .btn-reboot:hover {
            color: var(--liminal-100);
        }

        .btn-glitch {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--liminal-400);
            color: var(--liminal-400);
            padding: 0.5rem 1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            font-size: 10px;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-glitch:hover {
            background-color: var(--liminal-400);
            color: #050505;
            box-shadow: 0 0 15px rgba(212, 195, 130, 0.5);
        }

        .btn-glitch::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-glitch:hover::before {
            left: 100%;
        }

        @media (min-width: 640px) {
            .main-wrapper { padding: 1rem; }
        }

        @media (min-width: 768px) {
            .main-wrapper { padding: 1.5rem; }
            .terminal-box { padding: 1.5rem; }
            .terminal-title { font-size: 2.25rem; }
            .terminal-subtitle { font-size: 0.75rem; }
            .sys-info { font-size: 0.75rem; }
            .somatic-status { font-size: 0.75rem; }
            .btn-reboot { font-size: 0.75rem; }
            .btn-glitch { font-size: 0.75rem; padding-left: 2rem; padding-right: 2rem; }
        }

        @media (min-width: 1024px) {
            .main-wrapper { padding: 2rem; }
            .terminal-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

<main class="main-wrapper">
    <div class="terminal-box">

        <div class="terminal-gradient"></div>

        <header class="terminal-header">
            <div>
                <h1 class="terminal-title terminal-glow">LVL0.SYS.EXEC</h1>
                <p class="terminal-subtitle">PROCESS: engine.exe // VOLATILE MEMORY // ISOLATED MANIFOLD</p>
            </div>
            <div class="sys-info">
                <span class="active-instance animate-pulse">ACTIVE INSTANCE</span>
                <a href="index.html" class="abort-link">[ ABORT MANIFOLD ]</a>
            </div>
        </header>

        <div class="iframe-wrapper">
            <iframe
                    id="engine-frame"
                    src="engine.html"
                    title="Level 0 Engine Workspace"
                    allow="fullscreen; autoplay"
            ></iframe>
        </div>

        <footer class="terminal-footer">
            <div class="somatic-status">
                <span class="somatic-arrows animate-pulse">>></span> SOMATIC LINK ESTABLISHED
            </div>

            <div class="footer-actions">
                <button onclick="document.getElementById('engine-frame').contentWindow.location.reload();" class="btn-reboot">
                    [ SOFT REBOOT ]
                </button>
                <button onclick="requestEngineFullscreen()" class="btn-glitch">
                    Engage Fullscreen
                </button>
            </div>
        </footer>

    </div>
</main>

<script>
    function requestEngineFullscreen() {
        const iframe = document.getElementById('engine-frame');
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) {
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
            iframe.msRequestFullscreen();
        }
    }
</script>

</body>
</html>
